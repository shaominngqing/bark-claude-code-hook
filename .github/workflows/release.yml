name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-aarch64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp target/${{ matrix.target }}/release/bark bark-${{ matrix.name }}
          chmod +x bark-${{ matrix.name }}

      - name: Package (windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/bark.exe bark-${{ matrix.name }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bark-${{ matrix.name }}
          path: bark-${{ matrix.name }}*

  build-notifier:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: universal
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build BarkNotifier.app
        run: bash notifier/build.sh

      - name: Sign BarkNotifier
        run: codesign --force --deep --sign - notifier/build/BarkNotifier.app

      - name: Package BarkNotifier
        run: |
          cd notifier/build
          zip -r BarkNotifier-macos.zip BarkNotifier.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BarkNotifier-macos
          path: notifier/build/BarkNotifier-macos.zip

  release:
    needs: [build, build-notifier]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
